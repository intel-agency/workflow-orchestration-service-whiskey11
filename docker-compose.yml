services:
  orchestration-server:
    image: ghcr.io/intel-agency/workflow-orchestration-prebuild/devcontainer:main-latest
    ports:
      - "4096:4096"
    environment:
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - KIMI_CODE_ORCHESTRATOR_AGENT_API_KEY=${KIMI_CODE_ORCHESTRATOR_AGENT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GH_ORCHESTRATION_AGENT_TOKEN=${GH_ORCHESTRATION_AGENT_TOKEN}
      - GITHUB_TOKEN=${GH_ORCHESTRATION_AGENT_TOKEN}
    volumes:
      - server-memory:/opt/orchestration/.memory

  orchestration-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENCODE_SERVER_URL=http://orchestration-server:4096
      - GITHUB_TOKEN=${GH_ORCHESTRATION_AGENT_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG}
      - GITHUB_REPO=${GITHUB_REPO}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - SENTINEL_BOT_LOGIN=${SENTINEL_BOT_LOGIN:-}
    depends_on:
      orchestration-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  server-memory:
